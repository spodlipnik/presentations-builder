# Example theme.yaml — reference template used by talk-theme-builder
# This is NOT a real theme to use. It documents the format with 3 roles × 2 variants.

theme:
  id: example-theme
  name: Example Theme
  version: "1.0"
  description: Reference template showing theme.yaml structure
  created: "2026-04-05"
  updated: "2026-04-05"

  tokens:
    color:
      primary: "#0B3D91"
      accent: "#E63946"
      text: "#1A1A1A"
      background: "#FFFFFF"
      muted: "#6C757D"
    typography:
      heading:
        family: "Avenir Heavy"
        weight: 700
        size_pt: 54
      body:
        family: "Avenir Book"
        weight: 400
        size_pt: 24
      caption:
        family: "Avenir Book"
        weight: 400
        size_pt: 12
    spacing:
      margin_in: 0.5
      gutter_in: 0.25
    aspect_ratio: "16:9"
    slide:
      width_in: 13.333
      height_in: 7.5

  roles:
    title:
      variants:
        - id: title.centered
          description: Classic academic title, centered
          slots: [title, author, affiliation]
          layout:
            title:
              box: [0.10, 0.35, 0.80, 0.20]
              font: {size: 54, weight: bold, color: text, align: center}
            author:
              box: [0.10, 0.58, 0.80, 0.08]
              font: {size: 22, color: muted, align: center}
            affiliation:
              box: [0.10, 0.67, 0.80, 0.05]
              font: {size: 16, color: muted, align: center}
          thumbnail: thumbnails/title.centered.jpg

        - id: title.image-left
          description: Modern with image on the left
          slots: [title, author, image]
          layout:
            image:
              box: [0.0, 0.0, 0.45, 1.0]
              fit: cover
            title:
              box: [0.52, 0.35, 0.43, 0.25]
              font: {size: 48, weight: bold, color: text, align: left}
            author:
              box: [0.52, 0.62, 0.43, 0.08]
              font: {size: 20, color: muted, align: left}
          thumbnail: thumbnails/title.image-left.jpg

    assertion-evidence:
      variants:
        - id: ae.image-right
          description: Headline top, image right 60%
          slots: [headline, image, caption]
          layout:
            headline:
              box: [0.05, 0.08, 0.90, 0.15]
              font: {size: 32, weight: bold, color: text, align: left}
            image:
              box: [0.55, 0.28, 0.40, 0.55]
              fit: contain
            caption:
              box: [0.55, 0.85, 0.40, 0.05]
              font: {size: 12, color: muted, align: left}
          rules:
            min_chars_headline: 20
            max_chars_headline: 140
          thumbnail: thumbnails/ae.image-right.jpg

        - id: ae.chart-center
          description: Headline top, chart 80% centered below
          slots: [headline, chart, caption]
          layout:
            headline:
              box: [0.05, 0.05, 0.90, 0.12]
              font: {size: 28, weight: bold, color: text, align: left}
            chart:
              box: [0.10, 0.20, 0.80, 0.65]
              fit: contain
            caption:
              box: [0.10, 0.88, 0.80, 0.05]
              font: {size: 12, color: muted, align: center}
          thumbnail: thumbnails/ae.chart-center.jpg

    closing:
      variants:
        - id: closing.qa
          description: Q&A prompt
          slots: [message]
          layout:
            message:
              box: [0.10, 0.40, 0.80, 0.20]
              font: {size: 72, weight: bold, color: primary, align: center}
          thumbnail: thumbnails/closing.qa.jpg

  custom_roles: {}
