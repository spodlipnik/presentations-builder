# Talk Builder — Personal Configuration
# Copy this file to your assets directory as config.yaml
# Run /talk-setup to generate this interactively
#
# NOTE: Fonts and colors are NOT stored here.
# They live in your theme: themes/<name>/theme.yaml
# Create a theme with /talk-theme-builder create

language: "en"
narrative_style: "conversational"
complexity_default: "moderate"
default_theme: ""   # Set to your theme ID (e.g., "derma-congresos-2026")

style_analysis:
  # Generated automatically by /talk-setup when analyzing example slides
  layout: ""
  title_style: ""
  color_usage: ""
  typography: ""
  visual_density: ""
  notes: ""
